<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Mário Oliveira Dev" />
    <title>Mário Oliveira Dev</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #08111f;
        --bg-accent: #14233d;
        --text: #e8eefc;
        --muted: #9fb0d1;
        --line: rgba(255, 255, 255, 0.12);
        --glow: rgba(92, 139, 255, 0.25);
        --button: #d9e4ff;
        --button-text: #0b1530;
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(92, 139, 255, 0.22), transparent 42%),
          radial-gradient(circle at 85% 20%, rgba(64, 224, 208, 0.12), transparent 24%),
          linear-gradient(160deg, var(--bg), #060b15 70%);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(760px, 100%);
        padding: clamp(28px, 6vw, 56px);
        border: 1px solid var(--line);
        border-radius: 28px;
        background: linear-gradient(180deg, rgba(17, 27, 46, 0.88), rgba(11, 17, 30, 0.92));
        box-shadow:
          0 24px 80px rgba(0, 0, 0, 0.45),
          0 0 0 1px rgba(255, 255, 255, 0.03) inset,
          0 0 60px var(--glow);
        backdrop-filter: blur(16px);
      }
      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 18px;
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 0.78rem;
      }
      .eyebrow::before {
        content: "";
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: #6d9cff;
        box-shadow: 0 0 0 6px rgba(109, 156, 255, 0.15);
      }
      h1 {
        margin: 0;
        font-size: clamp(2.8rem, 7vw, 5.8rem);
        line-height: 0.95;
        letter-spacing: -0.05em;
      }
      p {
        margin: 20px 0 0;
        max-width: 60ch;
        color: var(--muted);
        font-size: clamp(1.05rem, 2vw, 1.2rem);
        line-height: 1.7;
      }
      .actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 30px; }
      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 18px;
        border-radius: 999px;
        border: 1px solid transparent;
        font-weight: 600;
        text-decoration: none;
      }
      .button.primary { background: var(--button); color: var(--button-text); }
      .button.secondary { border-color: var(--line); color: var(--text); background: rgba(255, 255, 255, 0.03); }
      .footer { margin-top: 28px; color: rgba(232, 238, 252, 0.58); font-size: 0.92rem; }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="eyebrow">mariooliveiradev.online</div>
      <h1>Mário Oliveira Dev.</h1>
      <p>Um site simples, direto e no ar pela sua VPS.</p>
      <div class="actions">
        <a class="button primary" href="mailto:oi@mariooliveiradev.online">Contato</a>
        <a class="button secondary" href="/">Atualizar</a>
      </div>
      <div class="footer">Servido por NGINX na VPS.</div>
    </main>
  </body>
</html>
